; ================================================================
;  ESP32-S3 TRICORDER — PlatformIO Configuration
;  Build: Test v3.8
;  Board: Lonely Binary Gold Edition (ESP32-S3-R8N16)
; ================================================================

[env:4d_systems_esp32s3_gen4_r8n16]
platform  = espressif32
board     = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

; ----------------------------------------------------------------
;  1. MEMORY & FLASH
; ----------------------------------------------------------------
board_build.arduino.memory_type = qio_opi
board_build.partitions          = default_16MB.csv

; ----------------------------------------------------------------
;  2. SERIAL MONITOR
; ----------------------------------------------------------------
monitor_port = /dev/cu./dev/cu.usbmodem5B5E1224831
monitor_speed = 115200


; ----------------------------------------------------------------
;  3. BUILD FLAGS
; ----------------------------------------------------------------
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D SDA_PIN=5
    -D SCL_PIN=6

; ----------------------------------------------------------------
;  4. LIBRARIES
;
;  NOTE v3.2: Adafruit APDS9960 library removed. The APDS9999 is a
;  different chip and is now driven natively in main.cpp.
; ----------------------------------------------------------------
lib_deps =
    adafruit/Adafruit GFX Library               @ ^1.11.5
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.0
    adafruit/Adafruit LED Backpack Library      @ ^1.4.0
    adafruit/Adafruit LIS2MDL                   @ ^2.1.3
    adafruit/Adafruit LTR390 Library            @ ^1.1.2
    adafruit/Adafruit BME680 Library            @ ^2.0.2
    adafruit/Adafruit AMG88xx Library           @ ^1.3.2
    adafruit/Adafruit Unified Sensor            @ ^1.1.14
    stm32duino/STM32duino VL53L4CX              @ ^1.1.0